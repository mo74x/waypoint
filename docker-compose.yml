version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: waypoint_user
      POSTGRES_PASSWORD: waypoint_password
      POSTGRES_DB: waypoint_db
    ports:
      - "5432:5432"
    volumes:
      - waypoint_data:/var/lib/postgresql/data

volumes:
  waypoint_data: